name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  framework:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Framework typecheck
        run: pnpm typecheck

      - name: Framework build
        run: pnpm --filter voreux build

      - name: Framework tests
        run: pnpm --filter voreux test
